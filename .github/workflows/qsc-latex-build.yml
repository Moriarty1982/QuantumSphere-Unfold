name: QSC LaTeX PDF Build

on:
  workflow_dispatch:
    inputs:
      source_dir:
        description: "Directory containing canonical TEX sources"
        required: false
        default: "sources"
      build_historical:
        description: "Build historical witness files as well"
        required: true
        type: boolean
        default: true
  push:
    branches:
      - main
    paths:
      - "sources/**"
      - "scripts/qsc_latex_build.py"
      - ".github/workflows/qsc-latex-build.yml"

permissions:
  contents: read
  packages: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  SOURCE_DIR: ${{ github.event.inputs.source_dir || 'sources' }}
  BUILD_HISTORICAL: ${{ github.event.inputs.build_historical || 'true' }}

concurrency:
  group: qsc-latex-build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-pdfs:
    name: Build QSC preview PDFs
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/moriarty1982/quantumsphere-unfold/qsc-latex:latest
    timeout-minutes: 180

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build preview PDFs
        continue-on-error: true
        run: |
          python3 scripts/qsc_latex_build.py \
            --source-dir "$SOURCE_DIR" \
            --output-dir "$GITHUB_WORKSPACE/build/qsc-pdf-artifacts" \
            --build-historical "$BUILD_HISTORICAL"

      - name: Upload QSC preview PDFs and logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qsc-pdf-artifacts-${{ github.ref_name }}-${{ github.run_number }}
          path: build/qsc-pdf-artifacts
          if-no-files-found: warn
          retention-days: 30
