name: QSC LaTeX PDF Build

on:
  workflow_dispatch:
    inputs:
      source_dir:
        description: "Directory containing canonical TEX sources"
        required: false
        default: "sources"
      build_historical:
        description: "Build historical witness files as well"
        required: true
        type: boolean
        default: true
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - "sources/**"
      - "scripts/qsc_latex_build.py"
      - ".github/workflows/qsc-latex-build.yml"

permissions:
  contents: read
  packages: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  SOURCE_DIR: ${{ github.event.inputs.source_dir || 'sources' }}
  BUILD_HISTORICAL: ${{ github.event.inputs.build_historical || 'true' }}

concurrency:
  group: qsc-latex-build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-pdfs:
    name: Build QSC PDFs
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/moriarty1982/quantumsphere-unfold/qsc-latex:latest
    timeout-minutes: 180

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build release PDFs
        continue-on-error: true
        run: |
          python3 scripts/qsc_latex_build.py \
            --source-dir "$SOURCE_DIR" \
            --output-dir "build/qsc-pdf-artifacts" \
            --build-historical "$BUILD_HISTORICAL"

      - name: Collect generated PDFs and logs
        if: always()
        run: |
          mkdir -p build/qsc-pdf-artifacts/logs build/qsc-pdf-artifacts/audit
          python3 - <<'PY'
          from pathlib import Path
          import shutil

          src = Path('sources/build/qsc-pdf-artifacts')
          dst = Path('build/qsc-pdf-artifacts')
          logs = dst / 'logs'
          audit = dst / 'audit'
          logs.mkdir(parents=True, exist_ok=True)
          audit.mkdir(parents=True, exist_ok=True)

          if src.exists():
              for p in src.rglob('*'):
                  if not p.is_file():
                      continue
                  if p.suffix == '.pdf':
                      shutil.copy2(p, dst / p.name)
                  elif p.suffix in {'.log', '.fls', '.fdb_latexmk'}:
                      shutil.copy2(p, logs / p.name)
                  elif p.parent == src and p.suffix in {'.json', '.md', '.txt'}:
                      shutil.copy2(p, audit / p.name)

          file_list = sorted(str(p) for p in dst.rglob('*') if p.is_file())
          (audit / 'artifact-file-list.txt').write_text('\n'.join(file_list) + '\n', encoding='utf-8')
          PY

      - name: Upload QSC PDFs and logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qsc-pdf-artifacts-${{ github.ref_name }}-${{ github.run_number }}
          path: build/qsc-pdf-artifacts
          if-no-files-found: warn
          retention-days: 30
