name: Build Quantum Sphaera Companion v3.35.0 PDFs

on:
  workflow_dispatch:
  push:
    paths:
      - 'active_core/**'
      - 'historical_witness/**'
      - '.github/workflows/build-v3-35-0.yml'

jobs:
  build-pdfs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compile Active Core
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          working_directory: active_core
          latexmk_use_xelatex: false
          args: -pdf -interaction=nonstopmode -halt-on-error -file-line-error

      - name: Compile Historical Witness
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          working_directory: historical_witness
          latexmk_use_xelatex: false
          args: -pdf -interaction=nonstopmode -halt-on-error -file-line-error

      - name: Collect PDFs
        run: |
          mkdir -p build
          cp active_core/main.pdf build/Quantum_Sphaera_Companion_v3_35_0_active_core_release_final.pdf
          cp historical_witness/main.pdf build/Quantum_Sphaera_Companion_v3_35_0_historical_witness_release_final.pdf

      - name: Upload built PDFs
        uses: actions/upload-artifact@v4
        with:
          name: Quantum_Sphaera_Companion_v3_35_0_pdfs
          path: build/*.pdf
