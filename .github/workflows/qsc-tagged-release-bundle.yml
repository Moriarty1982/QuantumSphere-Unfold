name: QSC Tagged Release Bundle

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: read

env:
  SOURCE_DIR: sources
  BUILD_HISTORICAL: true

jobs:
  tagged-release-bundle:
    name: Build and persist tagged release bundle
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/moriarty1982/quantumsphere-unfold/qsc-latex:latest
    timeout-minutes: 180

    steps:
      - name: Checkout tagged source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          VERSION="${GITHUB_REF_NAME}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build PDFs from tagged source
        continue-on-error: true
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          python3 scripts/qsc_latex_build.py \
            --source-dir "$SOURCE_DIR" \
            --output-dir "$GITHUB_WORKSPACE/build/qsc-pdf-artifacts" \
            --build-historical "$BUILD_HISTORICAL"

      - name: Prepare release directory
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          RELEASE_DIR="$RUNNER_TEMP/releases/$VERSION"
          mkdir -p "$RELEASE_DIR/logs" "$RELEASE_DIR/audit"

          cp -v build/qsc-pdf-artifacts/active-core/*.pdf "$RELEASE_DIR/" 2>/dev/null || true
          cp -v build/qsc-pdf-artifacts/historical-witness/*.pdf "$RELEASE_DIR/" 2>/dev/null || true
          cp -v build/qsc-pdf-artifacts/*.pdf "$RELEASE_DIR/" 2>/dev/null || true

          cp -v build/qsc-pdf-artifacts/active-core/*.log "$RELEASE_DIR/logs/" 2>/dev/null || true
          cp -v build/qsc-pdf-artifacts/historical-witness/*.log "$RELEASE_DIR/logs/" 2>/dev/null || true
          cp -v build/qsc-pdf-artifacts/logs/* "$RELEASE_DIR/logs/" 2>/dev/null || true

          cp -v build/qsc-pdf-artifacts/*.json "$RELEASE_DIR/audit/" 2>/dev/null || true
          cp -v build/qsc-pdf-artifacts/*.md "$RELEASE_DIR/audit/" 2>/dev/null || true
          cp -v build/qsc-pdf-artifacts/*.txt "$RELEASE_DIR/audit/" 2>/dev/null || true
          cp -v build/qsc-pdf-artifacts/audit/* "$RELEASE_DIR/audit/" 2>/dev/null || true

          zip -r "$RELEASE_DIR/Quantum_Sphaera_Companion_${VERSION}_sources.zip" sources scripts docker .github/workflows -x "*/.git/*"

          cd "$RUNNER_TEMP/releases"
          zip -r "Quantum_Sphaera_Companion_${VERSION}_release_bundle.zip" "$VERSION"
          mv "Quantum_Sphaera_Companion_${VERSION}_release_bundle.zip" "$RELEASE_DIR/"

          cd "$RELEASE_DIR"
          find . -type f ! -name SHA256SUMS.txt -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS.txt

      - name: Commit release directory to main
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin main
          git checkout main

          mkdir -p "releases/$VERSION"
          cp -rv "$RUNNER_TEMP/releases/$VERSION/." "releases/$VERSION/"

          git add "releases/$VERSION"
          git commit -m "Add release bundle $VERSION" || echo "No release changes to commit"
          git push origin main

      - name: Upload release bundle artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qsc-release-bundle-${{ steps.version.outputs.version }}
          path: ${{ runner.temp }}/releases/${{ steps.version.outputs.version }}
          if-no-files-found: warn
          retention-days: 30
