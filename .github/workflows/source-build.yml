name: Source ZIP build

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version folder, for example v3.35.0"
        required: false
        type: string
  push:
    paths:
      - "sources/**"
      - ".github/workflows/source-build.yml"
      - ".github/scripts/**"

permissions:
  contents: read

concurrency:
  group: source-build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  unpack-sources:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve source folder
        id: resolve
        run: |
          python3 .github/scripts/resolve_source_folder.py "${{ inputs.version }}"

      - name: Validate source folder
        run: |
          python3 .github/scripts/validate_source_folder.py "${{ steps.resolve.outputs.source_dir }}"

      - name: Unpack source ZIPs and ignore PDFs
        run: |
          python3 .github/scripts/unpack_sources.py "${{ steps.resolve.outputs.source_dir }}" work/unpacked

      - name: Write unpack report
        run: |
          python3 .github/scripts/write_unpack_report.py \
            "${{ steps.resolve.outputs.version }}" \
            "${{ steps.resolve.outputs.source_dir }}" \
            work/unpacked \
            work/logs

      - name: Upload unpacked preview
        uses: actions/upload-artifact@v4
        with:
          name: unpacked-${{ steps.resolve.outputs.version }}
          path: |
            work/unpacked
            work/logs
