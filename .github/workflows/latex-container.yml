name: QSC LaTeX Container

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - docker/latex/Dockerfile
      - .github/workflows/latex-container.yml

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/moriarty1982/quantumsphere-unfold/qsc-latex

jobs:
  build-container:
    name: Build QSC LaTeX container
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/latex/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
